/* Photo + shopping-list storage stays in browser (Notion handles recipe data). */
if (!window.storage) {
  var LS = window.localStorage;
  window.storage = {
    get: function(k){ try { var v=LS.getItem(k); return Promise.resolve(v===null?null:{key:k,value:v}); } catch(e){ return Promise.resolve(null);} },
    set: function(k,v){ try { LS.setItem(k,v); return Promise.resolve({key:k,value:v}); } catch(e){ return Promise.reject(e);} },
    delete: function(k){ try { LS.removeItem(k); return Promise.resolve({key:k,deleted:true}); } catch(e){ return Promise.resolve(null);} },
    list: function(p){ var keys=[]; for(var i=0;i<LS.length;i++){ var k=LS.key(i); if(!p||k.indexOf(p)===0) keys.push(k);} return Promise.resolve({keys:keys}); }
  };
}

/* ───────────────────────── storage helpers ───────────────────────── */
async function loadRecipes() {
  const r = await fetch("/api/recipes");
  if (!r.ok) {
    const t = await r.text();
    throw new Error("Couldn't load recipes from Notion: " + t.slice(0, 200));
  }
  const d = await r.json();
  return d.recipes || [];
}
// no-op: writes go through saveRecipe / deleteRecipe directly to the API
async function saveRecipes(list) { return list; }
async function saveRecipe(recipe) {
  const isNew = !recipe.id || !/^[0-9a-f]{8}-/.test(recipe.id);
  const body = isNew ? { recipe } : { id: recipe.id, recipe };
  const r = await fetch("/api/recipes", {
    method: isNew ? "POST" : "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error("Save failed");
  const d = await r.json();
  return d.recipe;
}
async function deleteRecipeApi(id) {
  const r = await fetch("/api/recipes?id=" + encodeURIComponent(id), { method: "DELETE" });
  if (!r.ok) throw new Error("Delete failed");
}
async function loadPhoto(id) {
  try {
    const r = await window.storage.get("photo:" + id);
    return r ? r.value : null;
  } catch {
    return null;
  }
}
async function savePhoto(id, dataUrl) {
  try {
    await window.storage.set("photo:" + id, dataUrl);
  } catch (e) {
    console.error("photo save failed", e);
  }
}
async function deletePhoto(id) {
  try {
    await window.storage.delete("photo:" + id);
  } catch {}
}

/* ───────────────────────── claude import ───────────────────────── */
const EXTRACT_PROMPT = `Extract the recipe from the provided content (it may be a screenshot of an Instagram post, a PDF, or pasted text).
Respond ONLY with valid JSON, no markdown fences, no extra text. Schema:
{
 "title": string,
 "description": string (one short appetizing line),
 "servings": number,
 "time_minutes": number or null,
 "cuisine": string (e.g. "Gujarati", "Italian"),
 "meal": array of strings, choose all that apply from exactly: "breakfast","lunch","dinner","snack","dessert","drink",
 "flavor": "sweet" | "savory" | "both",
 "veg": boolean (true if vegetarian),
 "ingredients": [{"amount": string (e.g. "2 tbsp", "1 cup", "to taste"), "name": string}],
 "steps": [string, ...] (clear numbered-style steps),
 "tags": array of 3-6 short lowercase tags like "one-pot","no-bake","kid-friendly","street-food"
}
If amounts are missing, estimate sensibly. If the content contains no recipe, return {"error":"not_a_recipe"}.`;

async function extractRecipe({ text, fileBase64, mediaType }) {
  const content = [];
  if (fileBase64) {
    if (mediaType === "application/pdf") {
      content.push({ type: "document", source: { type: "base64", media_type: "application/pdf", data: fileBase64 } });
    } else {
      content.push({ type: "image", source: { type: "base64", media_type: mediaType, data: fileBase64 } });
    }
  }
  content.push({ type: "text", text: EXTRACT_PROMPT + (text ? "\n\nCONTENT:\n" + text : "") });

  let response;
  try {
    response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        messages: [{ role: "user", content }],
      }),
    });
  } catch (e) {
    throw new Error("The photo/PDF reader can't reach Claude from here. Use the 'Write it' tab to add this one by hand — that works offline.");
  }

  // Read raw text first; the proxy doesn't always return JSON.
  const bodyText = await response.text();
  let data;
  try {
    data = JSON.parse(bodyText);
  } catch {
    throw new Error("Reader error " + response.status + ": " + bodyText.slice(0, 200));
  }

  if (!response.ok || data.error) {
    const msg = (data.error && (data.error.message || data.error.type)) || ("HTTP " + response.status);
    throw new Error("Reader error: " + msg);
  }

  const raw = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  if (!raw.trim()) throw new Error("The reader sent back an empty reply — try again in a moment.");
  if (data.stop_reason === "max_tokens") throw new Error("That recipe is very long — try cropping the screenshot to just the recipe, or paste the text instead.");

  const clean = raw.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{"), end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Couldn't find a recipe in that — try a clearer screenshot or paste the text.");
  let parsed;
  try {
    parsed = JSON.parse(clean.slice(start, end + 1));
  } catch {
    throw new Error("Couldn't read the recipe cleanly — try a clearer screenshot or paste the text.");
  }
  if (parsed.error) throw new Error("That doesn't look like a recipe — try a clearer screenshot or paste the caption text.");
  return parsed;
}

/* ───────────────────────── file utils ───────────────────────── */
function readFileBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Couldn't read the file"));
    r.readAsDataURL(file);
  });
}
function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("Couldn't read the file"));
    r.readAsDataURL(file);
  });
}
function loadImageFromFile(file) {
  return new Promise((res, rej) => {
    fileToDataUrl(file).then(dataUrl => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = () => rej(new Error("This image format isn't supported — try a JPG or PNG screenshot."));
      img.src = dataUrl;
    }).catch(rej);
  });
}
// Resize + convert any image to JPEG before sending to the API.
// Fixes huge phone screenshots (API rejects >5MB) and odd formats.
async function imageForApi(file) {
  const img = await loadImageFromFile(file);
  const maxSide = 1400;
  const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(img.width * scale));
  c.height = Math.max(1, Math.round(img.height * scale));
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  const dataUrl = c.toDataURL("image/jpeg", 0.82);
  return { base64: dataUrl.split(",")[1], mediaType: "image/jpeg" };
}
async function compressImage(file, maxW = 480) {
  const img = await loadImageFromFile(file);
  const scale = Math.min(1, maxW / img.width);
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(img.width * scale));
  c.height = Math.max(1, Math.round(img.height * scale));
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL("image/jpeg", 0.72);
}

const Btn = ({ children, onClick, variant = "primary", disabled, style }) => {
  const styles = {
    primary: { background: T.chili, color: "#FFF8EE", border: "none" },
    ghost: { background: "transparent", color: T.ink, border: `1.5px solid ${T.line}` },
    danger: { background: "transparent", color: T.chili, border: `1.5px solid ${T.chili}55` },
  }[variant];
  return (
    <button className="rs-btn" onClick={onClick} disabled={disabled}
      style={{ ...styles, padding: "10px 18px", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: disabled ? "wait" : "pointer", opacity: disabled ? 0.6 : 1, ...style }}>
      {children}
    </button>
  );
};

/* ───────────────────────── import modal ───────────────────────── */
function ImportModal({ onClose, onSaved }) {
  const [tab, setTab] = useState("file");
  const [pasted, setPasted] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [manual, setManual] = useState({ title: "", ingredients: "", steps: "", meal: [], flavor: "savory", tags: "", link: "", veg: true });

  const finish = async (data) => {
    const recipe = {
      id: uid(),
      createdAt: Date.now(),
      title: data.title || "Untitled recipe",
      description: data.description || "",
      servings: data.servings || 2,
      time_minutes: data.time_minutes || null,
      cuisine: data.cuisine || "",
      meal: Array.isArray(data.meal) ? data.meal : [],
      flavor: data.flavor || "savory",
      veg: data.veg !== false,
      ingredients: data.ingredients || [],
      steps: data.steps || [],
      tags: data.tags || [],
      link: data.link || "",
      hasPhoto: false,
    };
    await onSaved(recipe);
  };

  const handleFile = async (file) => {
    if (!file) return;
    setErr(""); setBusy(true);
    try {
      if (file.type === "application/pdf") {
        if (file.size > 4 * 1024 * 1024) throw new Error("That PDF is over 4MB — try a smaller one, or screenshot the recipe page instead.");
        const b64 = await readFileBase64(file);
        const data = await extractRecipe({ fileBase64: b64, mediaType: "application/pdf" });
        await finish(data);
      } else if (file.type.startsWith("image/") || file.type === "") {
        const { base64, mediaType } = await imageForApi(file);
        const data = await extractRecipe({ fileBase64: base64, mediaType });
        await finish(data);
      } else {
        throw new Error("Use an image screenshot or a PDF.");
      }
    } catch (e) {
      console.error("import failed:", e);
      setErr((e && e.message) || "Import failed — try again.");
      setBusy(false);
    }
  };

  const handlePaste = async () => {
    if (!pasted.trim()) { setErr("Paste the recipe text first."); return; }
    setErr(""); setBusy(true);
    try {
      const data = await extractRecipe({ text: pasted });
      await finish(data);
    } catch (e) {
      setErr(e.message || "Import failed — try again.");
      setBusy(false);
    }
  };

  const handleManual = async () => {
    if (!manual.title.trim()) { setErr("Give it a name."); return; }
    setErr(""); setBusy(true);
    try {
      const blob = (manual.title + " " + manual.ingredients + " " + manual.steps).toLowerCase();
      // light keyword-based auto-tags — no network needed
      const guesses = [
        ["no-bake", /no[\s-]?bake/], ["baking", /\b(bake|oven|preheat|baking)\b/],
        ["one-pot", /one[\s-]?pot|one[\s-]?pan/], ["quick", /\b(quick|5[\s-]?min|10[\s-]?min|easy)\b/],
        ["dressing", /\b(dressing|vinaigrette)\b/], ["sauce", /\bsauce\b/],
        ["drink", /\b(smoothie|juice|latte|shake|chai|coffee)\b/],
        ["high-protein", /\b(protein|paneer|tofu|chicken|egg|lentil|dal|chickpea)\b/],
        ["healthy", /\b(healthy|salad|wholesome)\b/],
      ];
      const autoTags = guesses.filter(([, re]) => re.test(blob)).map(([t]) => t);
      const customTags = manual.tags.split(",").map(t => t.trim().toLowerCase()).filter(Boolean);
      const tags = [...new Set([...customTags, ...autoTags])].slice(0, 8);

      await finish({
        title: manual.title.trim(),
        meal: manual.meal,
        flavor: manual.flavor,
        veg: manual.veg,
        link: manual.link.trim(),
        tags,
        ingredients: manual.ingredients.split("\n").map(l => l.trim()).filter(Boolean).map(l => {
          // try to split a leading quantity from the name, e.g. "2 cups flour"
          const m = l.match(/^([\d¼½¾⅓⅔\/.\s]+(?:cups?|tbsp|tsp|g|kg|ml|l|oz|lb|cloves?|pinch|cup|tablespoons?|teaspoons?)?\b)?\s*(.*)$/i);
          return m && m[2] ? { amount: (m[1] || "").trim(), name: m[2].trim() } : { amount: "", name: l };
        }),
        steps: manual.steps.split("\n").map(s => s.trim()).filter(Boolean),
      });
    } catch (e) {
      setErr((e && e.message) || "Couldn't save — try again.");
      setBusy(false);
    }
  };

  const tabBtn = (id, label) => (
    <button className="rs-chip" onClick={() => { setTab(id); setErr(""); }}
      style={{
        padding: "9px 14px", border: "none", borderBottom: `2.5px solid ${tab === id ? T.chili : "transparent"}`,
        background: "transparent", color: tab === id ? T.ink : T.inkSoft, fontWeight: 600, fontSize: 14, cursor: "pointer",
      }}>{label}</button>
  );

  const inputStyle = {
    width: "100%", padding: "11px 12px", borderRadius: 10, border: `1.5px solid ${T.line}`,
    background: "#FFFEFA", color: T.ink, fontSize: 14, resize: "vertical",
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(58,46,37,.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 16 }}
      onClick={busy ? undefined : onClose}>
      <div className="rs-fade" onClick={e => e.stopPropagation()}
        style={{ background: T.card, borderRadius: 18, width: "100%", maxWidth: 480, padding: 22, border: `1px solid ${T.line}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <h2 className="rs-display" style={{ margin: 0, fontSize: 22, color: T.ink }}>Add a recipe</h2>
          {!busy && <button onClick={onClose} className="rs-btn" style={{ border: "none", background: "transparent", fontSize: 20, cursor: "pointer", color: T.inkSoft }}>✕</button>}
        </div>
        <div style={{ display: "flex", gap: 4, borderBottom: `1px solid ${T.line}`, marginBottom: 16 }}>
          {tabBtn("file", "Screenshot / PDF")}{tabBtn("paste", "Paste text")}{tabBtn("manual", "Write it")}
        </div>

        {busy ? (
          <div style={{ textAlign: "center", padding: "34px 0" }}>
            <div className="rs-display" style={{ fontSize: 18, color: T.ink }}>Reading your recipe…</div>
            <div style={{ color: T.inkSoft, fontSize: 13.5, marginTop: 8 }}>Extracting ingredients, steps & sorting it onto the right shelf</div>
          </div>
        ) : (
          <>
            {tab === "file" && (
              <div>
                <p style={{ color: T.inkSoft, fontSize: 13.5, marginTop: 0 }}>
                  Screenshot an Instagram recipe (caption visible) or pick a PDF — everything gets extracted and tagged automatically.
                </p>
                <label style={{ display: "block", width: "100%", padding: "30px 12px", borderRadius: 12, border: `2px dashed ${T.clay}88`, background: "#FFF9EE", color: T.clay, fontSize: 14.5, fontWeight: 600, cursor: "pointer", textAlign: "center" }}>
                  Choose a screenshot or PDF
                  <input
                    type="file"
                    accept="image/*,application/pdf"
                    style={{ position: "absolute", width: 1, height: 1, opacity: 0, overflow: "hidden" }}
                    onChange={e => { const f = e.target.files && e.target.files[0]; e.target.value = ""; handleFile(f); }}
                  />
                </label>
              </div>
            )}
            {tab === "paste" && (
              <div>
                <textarea rows={7} style={inputStyle} placeholder="Paste the Instagram caption or any recipe text here…"
                  value={pasted} onChange={e => setPasted(e.target.value)} />
                <div style={{ marginTop: 12, textAlign: "right" }}><Btn onClick={handlePaste}>Extract & save</Btn></div>
              </div>
            )}
            {tab === "manual" && (
              <div style={{ display: "grid", gap: 10 }}>
                <input style={inputStyle} placeholder="Recipe name" value={manual.title}
                  onChange={e => setManual({ ...manual, title: e.target.value })} />
                <textarea rows={4} style={inputStyle} placeholder={"Ingredients — one per line\n2 cups besan\n1 tsp haldi"}
                  value={manual.ingredients} onChange={e => setManual({ ...manual, ingredients: e.target.value })} />
                <textarea rows={4} style={inputStyle} placeholder={"Steps — one per line"}
                  value={manual.steps} onChange={e => setManual({ ...manual, steps: e.target.value })} />

                <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 2 }}>Meal (tap any that fit)</div>
                <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                  {Object.keys(MEAL_COLORS).map(m => {
                    const on = manual.meal.includes(m);
                    return (
                      <Chip key={m} color={MEAL_COLORS[m]} active={on}
                        onClick={() => setManual({ ...manual, meal: on ? manual.meal.filter(x => x !== m) : [...manual.meal, m] })}>
                        {m}
                      </Chip>
                    );
                  })}
                </div>

                <input style={inputStyle} placeholder="Your tags, comma-separated — e.g. quick, kids, jain, festive"
                  value={manual.tags} onChange={e => setManual({ ...manual, tags: e.target.value })} />
                <input style={inputStyle} placeholder="Link to original recipe or video (optional)"
                  value={manual.link} onChange={e => setManual({ ...manual, link: e.target.value })} />

                <div style={{ display: "flex", gap: 7, flexWrap: "wrap", alignItems: "center" }}>
                  <Chip active={manual.flavor === "savory"} onClick={() => setManual({ ...manual, flavor: "savory" })}>savory</Chip>
                  <Chip active={manual.flavor === "sweet"} onClick={() => setManual({ ...manual, flavor: "sweet" })}>sweet</Chip>
                </div>

                <div style={{ textAlign: "right" }}><Btn onClick={handleManual}>Save recipe</Btn></div>
              </div>
            )}
            {err && <div style={{ marginTop: 12, color: T.chili, fontSize: 13.5 }}>{err}</div>}
          </>
        )}
      </div>
    </div>
  );
}

/* ───────────────────────── quantity scaling ───────────────────────── */
const UNICODE_FRAC = { "¼": 0.25, "½": 0.5, "¾": 0.75, "⅓": 1 / 3, "⅔": 2 / 3, "⅛": 0.125, "⅜": 0.375, "⅝": 0.625, "⅞": 0.875 };
function parseQty(tok) {
  if (!tok) return null;
  tok = tok.trim();
  if (UNICODE_FRAC[tok] != null) return UNICODE_FRAC[tok];
  let m = tok.match(/^(\d+)\s+(\d+)\/(\d+)$/); if (m) return +m[1] + (+m[2] / +m[3]); // 1 1/2
  m = tok.match(/^(\d+)\/(\d+)$/); if (m) return +m[1] / +m[2];                       // 1/2
  m = tok.match(/^(\d+)\s*([¼½¾⅓⅔⅛⅜⅝⅞])$/); if (m) return +m[1] + UNICODE_FRAC[m[2]]; // 1½
  if (/^\d*\.?\d+$/.test(tok)) return parseFloat(tok);
  return null;
}
function fmtQty(n) {
  if (!isFinite(n) || n <= 0) return "0";
  const whole = Math.floor(n + 1e-9), frac = n - whole;
  const opts = [[0, ""], [0.25, "¼"], [1 / 3, "⅓"], [0.5, "½"], [2 / 3, "⅔"], [0.75, "¾"]];
  let best = opts[0], bd = Math.abs(frac);
  for (const o of opts) { const d = Math.abs(frac - o[0]); if (d < bd) { bd = d; best = o; } }
  if (bd < 0.06) {
    const w = whole > 0 ? String(whole) : "";
    if (best[1]) return (w ? w + " " : "") + best[1];
    return w || "0";
  }
  return String(Math.round(n * 100) / 100);
}
const QTY_RE = "[\\d.\\/\\s¼½¾⅓⅔⅛⅜⅝⅞]+";
function scaleAmount(amount, factor) {
  if (!amount || factor === 1) return amount;
  const spaced = (rest) => (rest && !/^\s/.test(rest) ? " " + rest : rest);
  let m = amount.match(new RegExp("^(\\s*)(" + QTY_RE + ")\\s*[–-]\\s*(" + QTY_RE + ")(.*)$"));
  if (m) { const a = parseQty(m[2]), b = parseQty(m[3]); if (a != null && b != null) return m[1] + fmtQty(a * factor) + "–" + fmtQty(b * factor) + spaced(m[4]); }
  m = amount.match(new RegExp("^(\\s*)(" + QTY_RE + ")(.*)$"));
  if (m) { const q = parseQty(m[2].trim()); if (q != null) return m[1] + fmtQty(q * factor) + spaced(m[3]); }
  return amount; // "to taste", "pinch", "" — leave as-is
}

/* ───────────────────────── shopping list ───────────────────────── */
const SHOP_KEY = "shopping-v1";
function ShoppingList({ recipes, onClose }) {
  const [picked, setPicked] = useState({});   // recipeId -> true
  const [ticked, setTicked] = useState({});   // ingredient key -> true
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(SHOP_KEY); if (r) { const d = JSON.parse(r.value); setPicked(d.picked || {}); setTicked(d.ticked || {}); } } catch {}
      setLoaded(true);
    })();
  }, []);
  useEffect(() => {
    if (!loaded) return;
    window.storage.set(SHOP_KEY, JSON.stringify({ picked, ticked })).catch(() => {});
  }, [picked, ticked, loaded]);

  // combine ingredients across picked recipes, grouped by name
  const combined = {};
  recipes.forEach(r => {
    if (!picked[r.id]) return;
    r.ingredients.forEach(ing => {
      const key = ing.name.trim().toLowerCase();
      if (!key) return;
      if (!combined[key]) combined[key] = { name: ing.name.trim(), amounts: [] };
      if (ing.amount && ing.amount.trim()) combined[key].amounts.push(ing.amount.trim());
    });
  });
  const items = Object.entries(combined).sort((a, b) => a[1].name.localeCompare(b[1].name));
  const pickedCount = Object.values(picked).filter(Boolean).length;

  const inputStyle = { width: "100%", padding: "11px 12px", borderRadius: 10, border: `1.5px solid ${T.line}`, background: "#FFFEFA", color: T.ink, fontSize: 14 };

  return (
    <div className="rs-fade">
      <button className="rs-btn" onClick={onClose}
        style={{ border: "none", background: "transparent", color: T.clay, fontWeight: 600, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 14 }}>
        ← Back to recipes
      </button>
      <h1 className="rs-display" style={{ fontSize: 30, fontWeight: 700, margin: "0 0 4px", color: T.ink, display: "inline-block", borderBottom: `3px solid ${T.chili}`, paddingBottom: 4 }}>Shopping list</h1>
      <p style={{ color: T.inkSoft, fontSize: 14, margin: "10px 0 16px" }}>Pick the recipes you're cooking — their ingredients combine into one list you can tick off at the shop.</p>

      <div style={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 12, padding: "12px 14px", marginBottom: 18 }}>
        <div className="rs-mono" style={{ fontSize: 11, color: T.inkSoft, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Recipes ({pickedCount})</div>
        <div style={{ display: "grid", gap: 4, maxHeight: 220, overflowY: "auto" }}>
          {recipes.map(r => (
            <label key={r.id} style={{ display: "flex", gap: 9, alignItems: "center", padding: "5px 0", cursor: "pointer" }}>
              <input type="checkbox" checked={!!picked[r.id]} onChange={() => setPicked(p => ({ ...p, [r.id]: !p[r.id] }))} style={{ accentColor: T.chili }} />
              <span style={{ fontSize: 14, color: T.ink }}>{r.title}</span>
            </label>
          ))}
        </div>
      </div>

      {items.length > 0 && (
        <div className="rs-ruled" style={{ background: T.card, border: `1px solid ${T.line}`, borderTop: `4px solid ${T.leaf}`, borderRadius: "4px 4px 12px 12px", padding: "16px 18px", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <h2 className="rs-display" style={{ fontSize: 13, margin: 0, color: T.leaf, textTransform: "uppercase", letterSpacing: "1.5px", fontWeight: 700 }}>To buy</h2>
            <button className="rs-btn" onClick={() => setTicked({})} style={{ border: "none", background: "transparent", color: T.chili, fontSize: 12.5, cursor: "pointer" }}>clear ticks</button>
          </div>
          {items.map(([key, v]) => (
            <label key={key} style={{ display: "flex", gap: 10, alignItems: "baseline", padding: "5px 0", cursor: "pointer", opacity: ticked[key] ? 0.4 : 1, textDecoration: ticked[key] ? "line-through" : "none" }}>
              <input type="checkbox" checked={!!ticked[key]} onChange={() => setTicked(t => ({ ...t, [key]: !t[key] }))} style={{ accentColor: T.chili }} />
              <span style={{ fontSize: 14.5, color: T.ink }}>{v.name}</span>
              {v.amounts.length > 0 && <span className="rs-mono" style={{ fontSize: 12, color: T.inkSoft }}>{v.amounts.join(" + ")}</span>}
            </label>
          ))}
        </div>
      )}
      {pickedCount === 0 && <p style={{ color: T.inkSoft, fontSize: 14, textAlign: "center", padding: "20px 0" }}>No recipes picked yet.</p>}
    </div>
  );
}

/* ───────────────────────── main app ───────────────────────── */
function RecipeShelf() {
  const [recipes, setRecipes] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [mealFilter, setMealFilter] = useState(null);
  const [flavorFilter, setFlavorFilter] = useState(null);
  const [tagFilter, setTagFilter] = useState(null);
  const [favFilter, setFavFilter] = useState(false);
  const [arrange, setArrange] = useState("grouped");
  const [query, setQuery] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [showShopping, setShowShopping] = useState(false);
  const [restoreMsg, setRestoreMsg] = useState("");
  const [loadErr, setLoadErr] = useState("");
  const [thumbs, setThumbs] = useState({});

  useEffect(() => {
    (async () => {
      try { setRecipes(await loadRecipes()); }
      catch (e) { setLoadErr(e.message || "Couldn't load from Notion"); setRecipes([]); }
    })();
  }, []);

  useEffect(() => {
    if (!recipes) return;
    recipes.filter(r => r.hasPhoto && !(r.id in thumbs)).slice(0, 12).forEach(r => {
      loadPhoto(r.id).then(p => setThumbs(t => ({ ...t, [r.id]: p })));
    });
  }, [recipes]); // eslint-disable-line

  const persist = async (next) => { setRecipes(next); await saveRecipes(next); };

  const handleSaved = async (recipe) => {
    try {
      const saved = await saveRecipe(recipe);
      setRecipes(rs => [saved, ...(rs || [])]);
      setShowImport(false);
      setSelectedId(saved.id);
    } catch (e) { setLoadErr(e.message); }
  };

  const handleDelete = async (id) => {
    try {
      await deleteRecipeApi(id);
      setRecipes(rs => rs.filter(r => r.id !== id));
      deletePhoto(id);
      setSelectedId(null);
    } catch (e) { setLoadErr(e.message); }
  };

  const handlePhotoChange = async (id, hasPhoto) => {
    await persist(recipes.map(r => r.id === id ? { ...r, hasPhoto } : r));
    loadPhoto(id).then(p => setThumbs(t => ({ ...t, [id]: p })));
  };

  const handleUpdate = async (id, patch) => {
    setRecipes(rs => rs.map(r => r.id === id ? { ...r, ...patch } : r));
    try { await saveRecipe({ id, ...patch }); }
    catch (e) { setLoadErr("Couldn't sync to Notion: " + e.message); }
  };

  const handleBackup = () => {
    const data = JSON.stringify({ app: "recipe-box", version: 1, exportedAt: new Date().toISOString(), recipes }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `recipe-box-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };

  const handleRestore = async (file) => {
    setRestoreMsg("");
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const incoming = Array.isArray(data) ? data : data.recipes;
      if (!Array.isArray(incoming)) throw new Error("not a backup");
      const byId = {};
      (recipes || []).forEach(r => { byId[r.id] = r; });
      let added = 0;
      incoming.forEach(r => {
        if (r && r.id && r.title) { if (!byId[r.id]) added++; byId[r.id] = { ...byId[r.id], ...r }; }
      });
      const merged = Object.values(byId).sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0));
      await persist(merged);
      setRestoreMsg(`Restored — ${added} new recipe${added === 1 ? "" : "s"} added, the rest updated.`);
    } catch {
      setRestoreMsg("That file didn't look like a Recipe Box backup.");
    }
  };

  const selected = recipes?.find(r => r.id === selectedId);
  const allTags = [...new Set((recipes || []).flatMap(r => r.tags || []))].sort();
  const q = query.trim().toLowerCase();
  const filtered = (recipes || []).filter(r => {
    if (mealFilter && !r.meal.includes(mealFilter)) return false;
    if (favFilter && !r.favorite) return false;
    if (flavorFilter && r.flavor !== flavorFilter && r.flavor !== "both") return false;
    if (tagFilter && !(r.tags || []).includes(tagFilter)) return false;
    if (q && !(
      r.title.toLowerCase().includes(q) ||
      r.ingredients.some(i => i.name.toLowerCase().includes(q)) ||
      (r.tags || []).some(t => t.includes(q)) ||
      (r.cuisine || "").toLowerCase().includes(q)
    )) return false;
    return true;
  });

  return (
    <div className="rs-root" style={{ minHeight: "100vh", backgroundColor: T.paper, backgroundImage: DOODLE_BG, backgroundSize: "340px 340px", color: T.ink }}>
      <style>{FONT_CSS}</style>
      <div style={{ maxWidth: 880, margin: "0 auto", padding: "26px 18px 60px" }}>

        {selected ? (
          <Detail recipe={selected} onBack={() => setSelectedId(null)} onDelete={handleDelete} onPhotoChange={handlePhotoChange} onUpdate={handleUpdate} />
        ) : showShopping ? (
          <ShoppingList recipes={recipes || []} onClose={() => setShowShopping(false)} />
        ) : (
          <>
            <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 18, background: T.card, border: `1px solid ${T.line}`, borderLeft: `5px solid ${T.chili}`, borderRadius: 12, padding: "16px 18px", boxShadow: "0 2px 0 rgba(46,51,40,.06)" }}>
              <div>
                <span className="rs-stamp">Ritz's Kitchen</span>
                <h1 className="rs-display" style={{ margin: "10px 0 0", fontSize: 32, lineHeight: 1, fontWeight: 700, color: T.ink }}>The Recipe Box</h1>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <Btn onClick={() => setShowImport(true)}>+ Add recipe</Btn>
                <Btn variant="ghost" onClick={() => setShowShopping(true)}>Shopping list</Btn>
              </div>
            </header>

            <input
              value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Search by dish, ingredient, or tag…"
              style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `1.5px solid ${T.line}`, background: T.card, fontSize: 14.5, color: T.ink, marginBottom: 14 }}
            />

            <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 6, marginBottom: 6 }}>
              <Chip active={!mealFilter && !favFilter} onClick={() => { setMealFilter(null); setFavFilter(false); }}>All</Chip>
              <Chip color={T.turmeric} active={favFilter} onClick={() => setFavFilter(f => !f)}>★ favorites</Chip>
              {Object.keys(MEAL_COLORS).map(m => (
                <Chip key={m} color={MEAL_COLORS[m]} active={mealFilter === m} onClick={() => setMealFilter(mealFilter === m ? null : m)}>
                  {m}
                </Chip>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: allTags.length ? 12 : 20, alignItems: "center" }}>
              <Chip active={flavorFilter === "savory"} onClick={() => setFlavorFilter(flavorFilter === "savory" ? null : "savory")}>savory</Chip>
              <Chip active={flavorFilter === "sweet"} onClick={() => setFlavorFilter(flavorFilter === "sweet" ? null : "sweet")}>sweet</Chip>
              <span style={{ flex: 1 }} />
              <Chip active={arrange === "grouped"} onClick={() => setArrange("grouped")}>grouped</Chip>
              <Chip active={arrange === "list"} onClick={() => setArrange("list")}>list</Chip>
            </div>

            {allTags.length > 0 && (
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 6, marginBottom: 20, alignItems: "center" }}>
                <span className="rs-mono" style={{ fontSize: 11, color: T.inkSoft, textTransform: "uppercase", letterSpacing: 1, whiteSpace: "nowrap" }}>tags</span>
                {allTags.map(t => (
                  <Chip key={t} active={tagFilter === t} onClick={() => setTagFilter(tagFilter === t ? null : t)}>#{t}</Chip>
                ))}
              </div>
            )}

            {(() => {
              if (recipes === null) return <p style={{ color: T.inkSoft }}>Opening your shelf…</p>;
              if (filtered.length === 0) return (
                <div style={{ textAlign: "center", padding: "70px 20px", border: `2px dashed ${T.line}`, borderRadius: 16 }}>
                  <div className="rs-display" style={{ fontSize: 20, marginBottom: 8 }}>
                    {recipes.length === 0 ? "Your shelf is empty" : "Nothing matches"}
                  </div>
                  <p style={{ color: T.inkSoft, fontSize: 14, margin: "0 0 18px" }}>
                    {recipes.length === 0
                      ? "Add one with the Write it tab, or send a recipe to Claude in chat to import it."
                      : "Try clearing a filter or searching something else."}
                  </p>
                  {recipes.length === 0 && <Btn onClick={() => setShowImport(true)}>Add your first recipe</Btn>}
                </div>
              );

              const card = (r) => (
                <button key={r.id} className="rs-card rs-btn" onClick={() => setSelectedId(r.id)}
                  style={{ textAlign: "left", background: T.card, border: `1px solid ${T.line}`, borderTop: `4px solid ${MEAL_COLORS[r.meal && r.meal[0]] || T.clay}`, borderRadius: "4px 4px 10px 10px", padding: 0, cursor: "pointer", overflow: "hidden" }}>
                  {thumbs[r.id] && <img src={thumbs[r.id]} alt="" style={{ width: "100%", height: 110, objectFit: "cover", display: "block" }} />}
                  <div style={{ padding: "13px 15px 15px" }}>
                    <div style={{ display: "flex", gap: 5, marginBottom: 8, alignItems: "center" }}>
                      {r.meal.slice(0, 3).map(m => <Dot key={m} color={MEAL_COLORS[m] || T.clay} size={9} />)}
                      {r.flavor === "sweet" && <Dot color={MEAL_COLORS.dessert} size={9} />}
                      {r.favorite && <span style={{ marginLeft: "auto", color: T.turmeric, fontSize: 14 }}>★</span>}
                    </div>
                    <div className="rs-display" style={{ fontSize: 18, fontWeight: 600, color: T.ink, lineHeight: 1.15, marginBottom: 5 }}>{r.title}</div>
                    <div className="rs-mono" style={{ fontSize: 11.5, color: T.inkSoft }}>
                      {[r.cuisine, r.time_minutes ? `${r.time_minutes} min` : null].filter(Boolean).join(" · ")}
                    </div>
                  </div>
                </button>
              );
              const grid = (items) => (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: 14 }}>
                  {items.map(card)}
                </div>
              );

              // Grouped view only when nothing is narrowing the set
              const grouped = arrange === "grouped" && !q && !mealFilter && !flavorFilter && !tagFilter && !favFilter;
              if (!grouped) return grid(filtered);

              const sections = Object.keys(MEAL_COLORS)
                .map(m => ({ key: m, label: m, color: MEAL_COLORS[m], items: filtered.filter(r => r.meal.includes(m)) }))
                .filter(s => s.items.length > 0);
              const noMeal = filtered.filter(r => !r.meal || r.meal.length === 0);
              if (noMeal.length) sections.push({ key: "other", label: "sauces & extras", color: T.clay, items: noMeal });

              return (
                <div style={{ display: "grid", gap: 26 }}>
                  {sections.map(s => (
                    <div key={s.key}>
                      <div style={{ display: "inline-flex", alignItems: "center", gap: 8, marginBottom: 14, background: s.color, color: T.ink, padding: "6px 16px 7px", borderRadius: "10px 10px 0 0", boxShadow: "inset 0 -3px 0 rgba(71,63,74,.10)" }}>
                        <h2 className="rs-display" style={{ margin: 0, fontSize: 17, fontWeight: 700, color: T.ink, textTransform: "capitalize", letterSpacing: ".3px" }}>{s.label}</h2>
                        <span className="rs-mono" style={{ fontSize: 12, color: T.ink, opacity: .7 }}>{s.items.length}</span>
                      </div>
                      {grid(s.items)}
                    </div>
                  ))}
                </div>
              );
            })()}

            <div style={{ marginTop: 36, paddingTop: 18, borderTop: `1px solid ${T.line}`, fontSize: 12.5, color: T.inkSoft, textAlign: "center" }}>
              Synced with Notion · changes save automatically{loadErr ? " · " + loadErr : ""}
            </div>
          </>
        )}
      </div>

      {showImport && <ImportModal onClose={() => setShowImport(false)} onSaved={handleSaved} />}
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<RecipeShelf />);
</script>
</body>
</html>
